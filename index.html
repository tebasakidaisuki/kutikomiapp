<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クチコミ生成アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cafeWood: '#8D6E63',
                        cafeBg: '#FDF5E6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cafeBg min-h-screen p-4 text-slate-800">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden p-6">
        <h1 id="shop-name" class="text-2xl font-bold text-center text-cafeWood mb-6">読み込み中...</h1>

        <div class="flex justify-center gap-2 mb-8">
            <template id="star-template">
                <svg class="star w-10 h-10 cursor-pointer fill-slate-200 transition" viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
            </template>
            <div id="star-container" class="flex gap-2"></div>
        </div>

        <div id="input-area" class="hidden space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">おすすめメニュー</label>
                <div id="tag-container" class="flex flex-wrap gap-2"></div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">利用シーン</label>
                <div id="scene-container" class="flex flex-wrap gap-2"></div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">今の気分</label>
                <div id="mood-container" class="flex flex-wrap gap-2"></div>
            </div>

            <textarea id="free-text" class="w-full p-3 border rounded-xl h-24 text-sm focus:ring-2 focus:ring-cafeWood outline-none" placeholder="店主へのメッセージなど（任意）"></textarea>

            <button id="generate-btn" class="w-full bg-cafeWood text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">
                クチコミを生成する
            </button>
        </div>

        <div id="low-rating-message" class="hidden p-4 bg-orange-50 text-orange-700 rounded-xl text-center">
            ご期待に沿えず申し訳ございません。<br>よろしければ改善のため詳細をお聞かせください。
        </div>

        <div id="result-area" class="hidden mt-6 p-4 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
            <p id="generated-text" class="text-sm leading-relaxed mb-4"></p>
            <button id="copy-btn" class="w-full border-2 border-cafeWood text-cafeWood py-2 rounded-xl font-bold">コピーする</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1XxbZIzwMt38U-2jofDb5bm8UR2g9YgWILZRclUcLBtE';
        let shopData = {};

        // 1. スプレッドシートからデータを取得（CSV形式で取得するので認証不要）
        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            // CSVをパース（簡易版）
            const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
            const headers = rows[0];
            const data = rows[1]; // 1行目のデータを使用

            headers.forEach((h, i) => shopData[h] = data[i]);

            document.getElementById('shop-name').textContent = shopData.shopName;
            setupChips(shopData.tags, 'tag-container');
            setupChips(shopData.scenes, 'scene-container');
            setupChips(shopData.moods, 'mood-container');
        }

        function setupChips(dataString, containerId) {
            const container = document.getElementById(containerId);
            if(!dataString) return;
            dataString.split('/').forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item;
                btn.className = "px-3 py-1 rounded-full border border-slate-300 text-sm transition text-slate-700";
                btn.onclick = () => {
                    btn.classList.toggle('bg-cafeWood');
                    btn.classList.toggle('border-cafeWood');
                };
                container.appendChild(btn);
            });
        }

        // 2. 星評価のロジック
        const starContainer = document.getElementById('star-container');
        const template = document.getElementById('star-template');
        let currentRating = 0;

        for (let i = 0; i < 5; i++) {
            const star = template.content.cloneNode(true).querySelector('svg');
            star.onclick = () => {
                currentRating = i + 1;
                updateStars(currentRating);
                toggleInputArea(currentRating);
            };
            starContainer.appendChild(star);
        }

        function updateStars(rating) {
            const allStars = document.querySelectorAll('.star');
            allStars.forEach((s, i) => {
                s.classList.toggle('fill-yellow-400', i < rating);
                s.classList.toggle('fill-slate-200', i >= rating);
            });
        }

        function toggleInputArea(rating) {
            const inputArea = document.getElementById('input-area');
            const lowMsg = document.getElementById('low-rating-message');
            if (rating >= 3) {
                inputArea.classList.remove('hidden');
                lowMsg.classList.add('hidden');
            } else {
                inputArea.classList.add('hidden');
                lowMsg.classList.remove('hidden');
            }
        }

        // 3. 生成ロジック
        document.getElementById('generate-btn').onclick = async () => {
            const selectedTags = Array.from(document.querySelectorAll('#tag-container .bg-cafeWood')).map(b => b.textContent);
            const selectedScenes = Array.from(document.querySelectorAll('#scene-container .bg-cafeWood')).map(b => b.textContent);
            const selectedMoods = Array.from(document.querySelectorAll('#mood-container .bg-cafeWood')).map(b => b.textContent);

            const res = await fetch('/api/generate-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    star: currentRating,
                    tags: selectedTags,
                    scene: selectedScenes.join(','),
                    mood: selectedMoods.join(','),
                    freeText: document.getElementById('free-text').value,
                    shopName: shopData.shopName,
                    features: shopData.features,
                    atmosphere: shopData.atmosphere,
                    targetAudience: shopData.targetAudience
                })
            });

            const result = await res.json();
            document.getElementById('generated-text').textContent = result.text;
            document.getElementById('result-area').classList.remove('hidden');
        };

        fetchConfig();
    </script>
</body>
</html>
