<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クチコミ生成アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { cafeWood: '#8D6E63', cafeBg: '#FDF5E6' } } }
        }
    </script>
</head>
<body class="bg-cafeBg min-h-screen p-4 text-slate-800">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6 space-y-6">
        <h1 id="shop-name" class="text-2xl font-bold text-center text-cafeWood">読み込み中...</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">おすすめメニュー</label>
                <div id="tag-container" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">利用シーン</label>
                <div id="scene-container" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">今の気分</label>
                <div id="mood-container" class="flex flex-wrap gap-2"></div>
            </div>
            <textarea id="free-text" class="w-full p-3 border border-slate-200 rounded-xl h-20 text-sm outline-none focus:border-cafeWood" placeholder="自由な感想（任意）"></textarea>
        </div>

        <hr class="border-slate-100">

        <div class="text-center">
            <p class="text-sm font-medium mb-3">お店の評価を教えてください</p>
            <div id="star-container" class="flex justify-center gap-2"></div>
        </div>

        <button id="generate-btn" class="hidden w-full bg-cafeWood text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">
            クチコミを生成する
        </button>

        <div id="low-rating-message" class="hidden p-4 bg-orange-50 text-orange-700 rounded-xl text-center text-sm">
            ご期待に沿えず申し訳ございません。改善に努めます。
        </div>

        <p id="api-error" class="hidden text-sm text-red-600 text-center"></p>

        <div id="result-area" class="hidden space-y-4 pt-4 border-t border-slate-100">
            <div class="p-4 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                <p id="generated-text" class="text-sm leading-relaxed text-slate-600"></p>
            </div>
            <button id="copy-btn" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold text-sm">文章をコピーする</button>
            <a id="map-link" href="#" target="_blank" class="block w-full text-center py-3 rounded-xl border-2 border-cafeWood text-cafeWood font-bold text-sm hover:bg-cafeWood hover:text-white transition">
                Googleマップに投稿する
            </a>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1XxbZIzwMt38U-2jofDb5bm8UR2g9YgWILZRclUcLBtE';
        let shopData = {};

        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;
            const res = await fetch(url);
            const csv = await res.text();
            // カンマ区切りを正確にパース
            const rows = csv.split('\n').map(r => r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(c => c.replace(/"/g, '')) || []);
            const headers = rows[0];
            const data = rows[1];
            headers.forEach((h, i) => shopData[h] = data[i]);

            document.getElementById('shop-name').textContent = shopData.shopName;
            setupChips(shopData.tags, 'tag-container');
            setupChips(shopData.scenes, 'scene-container');
            setupChips(shopData.moods, 'mood-container');
            document.getElementById('map-link').href = shopData.googleMapUrl || '#';
        }

        function setupChips(str, containerId) {
            const container = document.getElementById(containerId);
            if(!str) return;
            
            str.split(/[,/]/).forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item.trim();
                // 初期状態：薄いグレー背景 + 濃いグレー文字
                btn.className = "px-4 py-2 rounded-xl border border-transparent text-sm transition bg-slate-100 text-slate-700 font-medium active:scale-95";
                
                btn.onclick = () => {
                    // 選択状態の切り替え
                    const isSelected = btn.classList.contains('bg-cafeWood');
                    
                    if (isSelected) {
                        // 非選択に戻す
                        btn.classList.remove('bg-cafeWood', 'text-white');
                        btn.classList.add('bg-slate-100', 'text-slate-700');
                    } else {
                        // 選択状態にする
                        btn.classList.remove('bg-slate-100', 'text-slate-700');
                        btn.classList.add('bg-cafeWood', 'text-white');
                    }
                };
                container.appendChild(btn);
            });
        }

        // 星評価
        let currentRating = 0;
        const starContainer = document.getElementById('star-container');
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.innerHTML = '★';
            star.className = "text-4xl cursor-pointer text-slate-200 transition";
            star.onclick = () => {
                currentRating = i;
                document.querySelectorAll('#star-container span').forEach((s, idx) => s.style.color = idx < i ? '#FACC15' : '#E2E8F0');
                document.getElementById('generate-btn').classList.toggle('hidden', i < 3);
                document.getElementById('low-rating-message').classList.toggle('hidden', i >= 3);
            };
            starContainer.appendChild(star);
        }

        document.getElementById('generate-btn').onclick = async () => {
            const btn = document.getElementById('generate-btn');
            const errEl = document.getElementById('api-error');
            errEl.classList.add('hidden');
            errEl.textContent = '';

            btn.textContent = "生成中...";
            btn.disabled = true;

            const selected = id => Array.from(document.querySelectorAll(`#${id} .bg-cafeWood`)).map(b => b.textContent).join('、');
            const tagStr = selected('tag-container');
            const tags = tagStr ? tagStr.split('、').filter(Boolean) : [];

            try {
                const res = await fetch('/api/generate-review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        star: currentRating,
                        tags,
                        scene: selected('scene-container'),
                        mood: selected('mood-container'),
                        freeText: document.getElementById('free-text').value,
                        shopName: shopData.shopName,
                        features: shopData.features,
                        atmosphere: shopData.atmosphere,
                        targetAudience: shopData.targetAudience
                    })
                });

                let result;
                try {
                    result = await res.json();
                } catch {
                    throw new Error('サーバーからの応答が JSON ではありません（API が動いていない可能性）');
                }

                if (!res.ok) {
                    throw new Error(result.message || `HTTP ${res.status}`);
                }

                document.getElementById('generated-text').textContent = result.text;
                document.getElementById('result-area').classList.remove('hidden');
            } catch (e) {
                const msg = e instanceof Error ? e.message : String(e);
                const netFail = /failed to fetch|load failed|networkerror/i.test(msg);
                errEl.textContent = netFail
                    ? msg + ' — ブラウザで file:// ではなく、`npx vercel dev` で開くか、Vercel にデプロイした URL で開いてください。'
                    : msg;
                errEl.classList.remove('hidden');
            } finally {
                btn.textContent = "クチコミを生成する";
                btn.disabled = false;
            }
        };

        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('generated-text').textContent);
            alert('コピーしました！');
        };

        fetchConfig();
    </script>
</body>
</html>
